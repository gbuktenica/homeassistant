automation: !include automations.yaml
cloud:
config:
frontend:
#group: !include groups.yaml
history:
map:
mobile_app:
person:
script: !include scripts.yaml
scene: !include scenes.yaml
ssdp:
sun:
system_health:
updater:
zeroconf:

homeassistant:
  name: hassio
  unit_system: metric
  customize: !include customize.yaml
  packages: !include_dir_named packages
  time_zone: Australia/Perth

http:
  base_url: hassio.buktenica.com:8123
  ssl_certificate: /ssl/fullchain.pem
  ssl_key: /ssl/privkey.pem

# Text to speech
tts:
  - platform: google_translate
    service_name: google_translate_say

system_log:
  max_entries: 200

zwave:
  usb_path: /dev/ttyACM0
  polling_interval: 60000
  config_path: /config/z-wave/open-zwave/config
  device_config: !include zwave_device_config.yaml

remote:
  - platform: harmony
    name: LOUNGE HUB
    host: 10.1.1.183
    activity: Netflix

smartir:
switch:
  - platform: broadlink
    host: 10.1.1.168
    mac: 'c8:f7:42:76:29:cb'

climate:
  - platform: smartir
    name: Lounge AC
    unique_id: lounge_ac
    device_code: 1288
    controller_data: 10.1.1.168
    temperature_sensor: sensor.aeon_labs_zw100_multisensor_6_temperature
    humidity_sensor: sensor.aeon_labs_zw100_multisensor_6_relative_humidity
    power_sensor: binary_sensor.lounge_ac_power

spotify:
  client_id: b7abf61b8ec84c6789940eac397b73c6
  client_secret: e1a42ee6fb6c43fca8739c3b1dfb0000

binary_sensor:
  - platform: workday
    country: AU
    province: WA

sensor:
  - platform: time_date
    display_options:
      - 'date_time'
      - 'time'

unifi:
  controllers:
    - host: unifi.buktenica.com
      site: York Street
      ssid_filter:
        - '4PAWS'
      dont_track_wired_clients: True

light:
  - platform: template
    lights:
      lounge_lights:
        friendly_name: "Lounge Lights"
        turn_on:
          service: script.lounge_lights_on
        turn_off:
          service: script.lounge_lights_off
