substitutions:
  name: ratgdodisco
  friendly_name: ratgdodisco
  ip: "10.4.4.46"
  ssid: IoTG

packages:
  ratgdo.esphome: github://ratgdo/esphome-ratgdo/v32disco.yaml@main
esphome:
  name: ${name}
  name_add_mac_suffix: false
  friendly_name: ${friendly_name}
api:
  encryption:
    key: !secret api

wifi:
  ssid: ${ssid}
  password: !secret iot
  fast_connect: true
  use_address: ${ip}
  manual_ip:
    static_ip: ${ip}
    gateway: 10.4.4.1
    subnet: 255.255.255.0
sensor:
  - platform: wifi_signal
    name: ${name}-wifi 
    update_interval: 60s
