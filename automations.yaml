- id: '1579749968208'
  alias: Morning AirCon
  description: ''
  trigger:
  - at: 05:00:00
    platform: time
  condition:
  - condition: state
    entity_id: binary_sensor.workday_sensor
    state: 'on'
  action:
    - service: climate.set_hvac_mode
      data:
        entity_id: climate.upstairs
        hvac_mode: off