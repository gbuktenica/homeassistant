# https://www.nabucasa.com/config/google_assistant/
cloud:
  google_actions:
    filter:
      include_domains:
        - climate
        - cover
        - group
        - media_player
        - scene
        - script
        - sensor
      include_entities:
        - light.stairway_light
        - light.entry_light
        - light.kitchen_light
        - light.dining_light
        - light.outside_light
        - light.rear_outside
        - light.garden_lights
        - light.party_lights
        - light.hall_light
        - switch.coffee_machine
        - cover.lounge_night_blind_level
        - cover.lounge_day_blind_level
        - climate.upstairs
        - climate.lounge_ac
        - sensor.multisensor_temperature
    entity_config:
      - light.stairway_light:
          name: Stairway Light
          aliases:
          - stairway light
          - stairway lights
          room: lounge
      - light.entry_light:
          name: Entry Light
          aliases:
          - entry light
          - entry lights
          room: lounge
      - light.dining_light:
          name: Dining Light
          aliases:
          - dining light
          - dining lights
          room: dining
      - light.kitchen_light:
          name: Kitchen Light
          aliases:
          - kitchen light
          - kitchen lights
          room: kitchen

